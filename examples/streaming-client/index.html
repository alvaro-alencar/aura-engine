<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aura Streaming Client</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #090b12;
        color: #f7f7fb;
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        width: min(860px, calc(100vw - 32px));
        padding: 28px;
        border-radius: 24px;
        background: rgba(255, 255, 255, 0.06);
        border: 1px solid rgba(255, 255, 255, 0.12);
      }

      button {
        border: 0;
        border-radius: 14px;
        padding: 12px 16px;
        font-weight: 700;
        cursor: pointer;
      }

      pre {
        min-height: 320px;
        padding: 16px;
        border-radius: 18px;
        background: rgba(0, 0, 0, 0.32);
        overflow: auto;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Aura Streaming Client</h1>
      <p>Open this page while Aura Engine is running. It listens to <code>GET /events</code>.</p>
      <button id="send">Send sample update</button>
      <pre id="log"></pre>
    </main>

    <script>
      const log = document.querySelector("#log");
      const send = document.querySelector("#send");
      const events = new EventSource("http://localhost:8787/events");

      function append(label, payload) {
        log.textContent = `${new Date().toISOString()} ${label}\n${JSON.stringify(payload, null, 2)}\n\n${log.textContent}`;
      }

      events.addEventListener("aura.update", (event) => {
        append("aura.update", JSON.parse(event.data));
      });

      events.addEventListener("aura.reset", (event) => {
        append("aura.reset", JSON.parse(event.data));
      });

      events.addEventListener("aura.heartbeat", (event) => {
        append("aura.heartbeat", JSON.parse(event.data));
      });

      events.addEventListener("error", () => {
        append("error", { message: "Could not connect to Aura Engine. Is npm run server active?" });
      });

      send.addEventListener("click", async () => {
        await fetch("http://localhost:8787/update", {
          method: "POST",
          headers: { "content-type": "application/json" },
          body: JSON.stringify({
            mode: "creative_session",
            topic: "streaming ambience",
            emotionalTone: "mystical",
            intensity: Math.random(),
            silenceDurationMs: 5000,
            userTypingSpeed: "slow",
            agentName: "Aura"
          })
        });
      });
    </script>
  </body>
</html>
