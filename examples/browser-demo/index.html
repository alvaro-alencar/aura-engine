<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aura Engine Demo</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #080a10;
        color: #f5f7fb;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at top left, rgba(117, 92, 255, 0.28), transparent 34rem),
          radial-gradient(circle at bottom right, rgba(0, 229, 255, 0.14), transparent 30rem),
          #080a10;
      }

      main {
        width: min(920px, calc(100vw - 32px));
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 28px;
        padding: 28px;
        background: rgba(10, 13, 24, 0.72);
        box-shadow: 0 24px 80px rgba(0, 0, 0, 0.5);
        backdrop-filter: blur(18px);
      }

      h1 {
        margin: 0 0 8px;
        font-size: clamp(2rem, 7vw, 5rem);
        letter-spacing: -0.08em;
      }

      p {
        color: rgba(245, 247, 251, 0.74);
        line-height: 1.7;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 14px;
        margin: 24px 0;
      }

      button, select, input {
        border: 1px solid rgba(255, 255, 255, 0.16);
        border-radius: 16px;
        padding: 12px 14px;
        background: rgba(255, 255, 255, 0.08);
        color: #f5f7fb;
        font: inherit;
      }

      button {
        cursor: pointer;
        background: linear-gradient(135deg, rgba(117, 92, 255, 0.78), rgba(0, 229, 255, 0.42));
        font-weight: 700;
      }

      pre {
        white-space: pre-wrap;
        background: rgba(0, 0, 0, 0.34);
        border-radius: 18px;
        padding: 16px;
        overflow: auto;
      }

      .badge {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        border: 1px solid rgba(255, 255, 255, 0.14);
        border-radius: 999px;
        padding: 8px 12px;
        color: rgba(245, 247, 251, 0.72);
      }
    </style>
  </head>
  <body>
    <main>
      <span class="badge">aura.v1 · concept by Álvaro Alencar</span>
      <h1>Aura Engine</h1>
      <p>
        A responsive ambience engine for AI interfaces. Choose a conversational state and let the browser create a living sound field.
      </p>

      <div class="grid">
        <select id="tone">
          <option value="neutral">neutral</option>
          <option value="lonely_reflective" selected>lonely_reflective</option>
          <option value="focused">focused</option>
          <option value="curious">curious</option>
          <option value="excited">excited</option>
          <option value="tense">tense</option>
          <option value="sad">sad</option>
          <option value="calm">calm</option>
          <option value="playful">playful</option>
          <option value="mystical">mystical</option>
        </select>

        <input id="intensity" type="range" min="0" max="1" step="0.01" value="0.72" />
        <button id="start">Start ambience</button>
        <button id="stop">Stop</button>
      </div>

      <pre id="output"></pre>
    </main>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
