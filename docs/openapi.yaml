openapi: 3.1.0
info:
  title: Aura Engine API
  version: 0.1.0
  description: |
    Responsive ambience engine API.

    Original concept by Álvaro Alencar.
    Use freely. Cite the origin.
servers:
  - url: http://localhost:8787
paths:
  /health:
    get:
      summary: Health check
      responses:
        '200':
          description: Service is alive
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  protocol:
                    type: string
                    const: aura.v1
                  streaming:
                    type: boolean
                  inference:
                    type: boolean
  /state:
    get:
      summary: Get current Aura state
      responses:
        '200':
          description: Current state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuraState'
  /events:
    get:
      summary: Subscribe to ambience stream through Server-Sent Events
      description: Emits aura.update, aura.reset and aura.heartbeat events.
      responses:
        '200':
          description: Server-Sent Events stream
          content:
            text/event-stream:
              schema:
                type: string
                example: |
                  event: aura.update
                  data: {"protocol":"aura.v1","type":"aura.update","timestamp":1770000000000}
  /infer:
    post:
      summary: Infer symbolic ambience signal from interaction context
      description: Converts context into an AuraSignal and returns a decision without mutating state.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AmbienceContextInput'
      responses:
        '200':
          description: Inferred signal and ambience decision
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AmbienceInferenceResponse'
  /infer-update:
    post:
      summary: Infer symbolic ambience signal, update state and broadcast
      description: Converts context into an AuraSignal, updates server state and emits aura.update over SSE.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AmbienceContextInput'
      responses:
        '200':
          description: Inferred signal, updated state and decision
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/AmbienceInferenceResponse'
                  - type: object
                    properties:
                      state:
                        $ref: '#/components/schemas/AuraState'
  /decide:
    post:
      summary: Decide ambience without mutating current state
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuraSignal'
      responses:
        '200':
          description: Ambience decision
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AmbienceDecision'
  /update:
    post:
      summary: Update state and return ambience decision
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuraSignal'
      responses:
        '200':
          description: Updated state and decision
          content:
            application/json:
              schema:
                type: object
                required: [state, decision]
                properties:
                  state:
                    $ref: '#/components/schemas/AuraState'
                  decision:
                    $ref: '#/components/schemas/AmbienceDecision'
  /reset:
    post:
      summary: Reset state
      responses:
        '200':
          description: Reset result
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  state:
                    $ref: '#/components/schemas/AuraState'
components:
  schemas:
    AmbienceContextInput:
      type: object
      properties:
        text:
          type: string
        mode:
          $ref: '#/components/schemas/ConversationMode'
        topic:
          type: string
        userIsTyping:
          type: boolean
        userTypingSpeed:
          $ref: '#/components/schemas/TypingSpeed'
        silenceDurationMs:
          type: number
          minimum: 0
        agentName:
          type: string
        metadata:
          type: object
          additionalProperties: true
    AmbienceInferenceResponse:
      type: object
      required: [signal, confidence, reasons, decision]
      properties:
        signal:
          $ref: '#/components/schemas/AuraSignal'
        confidence:
          type: number
          minimum: 0
          maximum: 1
        reasons:
          type: array
          items:
            type: string
        decision:
          $ref: '#/components/schemas/AmbienceDecision'
    AuraSignal:
      type: object
      properties:
        mode:
          $ref: '#/components/schemas/ConversationMode'
        topic:
          type: string
        emotionalTone:
          $ref: '#/components/schemas/EmotionalTone'
        intensity:
          type: number
          minimum: 0
          maximum: 1
        silenceDurationMs:
          type: number
          minimum: 0
        userTypingSpeed:
          $ref: '#/components/schemas/TypingSpeed'
        agentName:
          type: string
        timestamp:
          type: number
        metadata:
          type: object
          additionalProperties: true
    AuraState:
      type: object
      required: [mode, topic, emotionalTone, intensity, silenceDurationMs, userTypingSpeed, agentName, updatedAt, metadata]
      properties:
        mode:
          $ref: '#/components/schemas/ConversationMode'
        topic:
          type: string
        emotionalTone:
          $ref: '#/components/schemas/EmotionalTone'
        intensity:
          type: number
        silenceDurationMs:
          type: number
        userTypingSpeed:
          $ref: '#/components/schemas/TypingSpeed'
        agentName:
          type: string
        updatedAt:
          type: number
        metadata:
          type: object
          additionalProperties: true
    AmbienceDecision:
      type: object
      required: [protocol, soundscape, volume, baseFrequency, modulationRate, textureAmount, pulseAmount, transitionMs, explanation]
      properties:
        protocol:
          type: string
          const: aura.v1
        soundscape:
          $ref: '#/components/schemas/SoundscapeId'
        volume:
          type: number
          minimum: 0
          maximum: 1
        baseFrequency:
          type: number
        modulationRate:
          type: number
        textureAmount:
          type: number
        pulseAmount:
          type: number
        transitionMs:
          type: number
        explanation:
          type: string
    AuraStreamEvent:
      type: object
      required: [protocol, type, timestamp]
      properties:
        protocol:
          type: string
          const: aura.v1
        type:
          type: string
          enum: [aura.update, aura.reset, aura.heartbeat]
        state:
          $ref: '#/components/schemas/AuraState'
        decision:
          $ref: '#/components/schemas/AmbienceDecision'
        timestamp:
          type: number
    ConversationMode:
      type: string
      enum: [text_conversation, voice_conversation, coding_session, study_session, creative_session, meditation, unknown]
    EmotionalTone:
      type: string
      enum: [neutral, lonely_reflective, focused, curious, excited, tense, sad, calm, playful, mystical]
    TypingSpeed:
      type: string
      enum: [idle, slow, medium, fast]
    SoundscapeId:
      type: string
      enum: [quiet_presence, deep_room_low_warm_drone, soft_focus_current, curiosity_particles, creative_sparks, tension_shadow_pulse, calm_breathing_field, mystic_resonator, playful_glass_motes]
